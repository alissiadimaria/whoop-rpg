name: Refresh WHOOP data

on:
  schedule:
    - cron: '0 16 * * *'  # 12:00 EDT (UTC-4) daily
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv pandas numpy ruptures scikit-learn scipy fastapi uvicorn

      - name: Write tokens file
        run: echo '${{ secrets.WHOOP_TOKENS }}' > data/tokens.json

      - name: Write .env
        run: |
          echo "WHOOP_CLIENT_ID=${{ secrets.WHOOP_CLIENT_ID }}" > .env
          echo "WHOOP_CLIENT_SECRET=${{ secrets.WHOOP_CLIENT_SECRET }}" >> .env

      - name: Fetch WHOOP data
        run: python src/fetch.py

      - name: Save refreshed tokens back to GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set WHOOP_TOKENS --body "$(cat data/tokens.json)"

      - name: Process data
        run: python src/process.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/processed/
          git diff --staged --quiet || git commit -m "chore: refresh WHOOP data $(date +%Y-%m-%d)"
          git push
